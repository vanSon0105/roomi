<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - ROOMI</title>
    <meta name="description" content="Đăng nhập tài khoản ROOMI.">
    <link rel="stylesheet" href="assets/css/styles.css">
  </head>
  <body class="auth-page" data-page="login">
    <main>
      <a class="auth-logo" href="index.html">
        <img src="assets/images/figma/logo-roomi-footer.png" alt="ROOMI">
      </a>
      <section class="auth-card reveal">
        <h1>Đăng nhập</h1>
        <form class="auth-form" data-auth-form>
          <input class="roomi-input" type="email" autocomplete="email" placeholder="Email" required>
          <input class="roomi-input" type="password" autocomplete="current-password" placeholder="Mật khẩu" required>
          <div class="auth-actions">
            <button class="btn btn-cream" type="submit">Đăng nhập</button>
            <a href="register.html">Chưa có tài khoản? Đăng ký</a>
            <p data-auth-notice></p>
          </div>
        </form>
      </section>
    </main>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script type="module" src="assets/js/auth.js?v=nav-public-1"></script>
  </body>
</html>

<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - ROOMI</title>
    <meta name="description" content="Đăng nhập tài khoản ROOMI.">
    <link rel="icon" href="../assets/images/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="../assets/css/styles.css">
  </head>
  <body class="auth-page" data-page="login">
    <main>
      <a class="auth-logo" href="../index.html">
        <img src="../assets/images/figma/logo-roomi-footer.png" alt="ROOMI">
      </a>
      <section class="auth-card auth-card-login">
        <h1>Đăng nhập</h1>
        <form class="auth-form auth-form-login" data-auth-form>
          <input class="roomi-input" name="identifier" type="text" autocomplete="username" placeholder="Tên đăng nhập" required>
          <input class="roomi-input" name="password" type="password" autocomplete="current-password" placeholder="Mật khẩu" required>
          <a class="auth-forgot" href="#">Quên mật khẩu?</a>
          <div class="auth-actions">
            <button class="btn btn-cream" type="submit">Đăng nhập</button>
            <p class="auth-switch">Bạn chưa có tài khoản? <a href="register.html">Đăng kí</a></p>
            <p class="auth-notice" data-auth-notice></p>
          </div>
        </form>
      </section>
    </main>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script type="module" src="../assets/js/auth.js?v=pages-path-1"></script>
  </body>
</html>

<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - ROOMI</title>
    <meta name="description" content="Đăng ký tài khoản ROOMI.">
    <link rel="stylesheet" href="../assets/css/styles.css">
  </head>
  <body class="auth-page" data-page="register">
    <main>
      <a class="auth-logo" href="../index.html">
        <img src="../assets/images/figma/logo-roomi-footer.png" alt="ROOMI">
      </a>
      <section class="auth-card auth-card-register">
        <h1>Đăng ký</h1>
        <form class="auth-form auth-form-register" data-auth-form>
          <input class="roomi-input" name="name" type="text" autocomplete="username" placeholder="Tên đăng nhập" required>
          <input class="roomi-input" name="email" type="email" autocomplete="email" placeholder="E-mail" required>
          <input class="roomi-input" name="phone" type="tel" autocomplete="tel" placeholder="Số điện thoại" required>
          <input class="roomi-input" name="password" type="password" autocomplete="new-password" placeholder="Mật khẩu" required>
          <input class="roomi-input" name="confirmPassword" type="password" autocomplete="new-password" placeholder="Nhập lại mật khẩu" required>
          <div class="auth-actions">
            <button class="btn btn-cream" type="submit">Đăng ký</button>
            <p class="auth-switch">Bạn đã có tài khoản? <a href="login.html">Đăng nhập</a></p>
            <p class="auth-notice" data-auth-notice></p>
          </div>
        </form>
      </section>
    </main>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script type="module" src="../assets/js/auth.js?v=pages-path-1"></script>
  </body>
</html>
